
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeEase | Programming Made Friendly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ce-deep-navy: #001D39;
            --ce-dark-blue: #0A4174;
            --ce-muted-blue: #49769F;
            --ce-teal-blue: #4E8EA2;
            --ce-soft-cyan: #6EA2B3;
            --ce-light-sky: #7BBDE8;
            --ce-very-light: #BDD8E9;
            --ce-accent-orange: #FF6321;
            --ce-radius-sm: 12px;
            --ce-radius-md: 16px;
            --ce-radius-lg: 24px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--ce-deep-navy);
            color: #ffffff;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .ce-bg-main {
            background: linear-gradient(135deg, var(--ce-deep-navy) 0%, var(--ce-dark-blue) 100%);
            min-height: 100vh;
        }

        .ce-mesh-hero {
            background: radial-gradient(circle at 20% 30%, var(--ce-dark-blue) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, var(--ce-muted-blue) 0%, transparent 50%),
                        radial-gradient(circle at 50% 10%, var(--ce-deep-navy) 0%, transparent 40%);
        }

        .ce-glass {
            background: rgba(10, 65, 116, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(123, 189, 232, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease-in-out;
        }

        .ce-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--ce-radius-md);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease-in-out;
        }

        .ce-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--ce-light-sky);
            box-shadow: 0 15px 35px -10px rgba(123, 189, 232, 0.2);
        }

        .ce-btn {
            border-radius: var(--ce-radius-sm);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .ce-btn:hover {
            transform: scale(1.03);
        }

        .ce-btn:active {
            transform: scale(0.97);
        }

        .ce-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--ce-radius-sm);
            padding: 12px 16px;
            color: white;
            transition: all 0.2s ease-in-out;
        }

        .ce-input:focus {
            outline: none;
            border-color: var(--ce-light-sky);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(123, 189, 232, 0.2);
        }

        .ce-glow-blue {
            box-shadow: 0 0 20px rgba(123, 189, 232, 0.15);
        }
        .ce-glow-blue:hover {
            box-shadow: 0 0 30px rgba(123, 189, 232, 0.3);
        }

        .ce-glow-orange {
            box-shadow: 0 0 20px rgba(255, 99, 33, 0.15);
        }
        .ce-glow-orange:hover {
            box-shadow: 0 0 30px rgba(255, 99, 33, 0.3);
        }

        .ce-heading {
            color: #ffffff;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .ce-text-muted {
            color: var(--ce-soft-cyan);
            font-weight: 500;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--ce-deep-navy); }
        ::-webkit-scrollbar-thumb { 
            background: var(--ce-muted-blue); 
            border-radius: 10px;
            border: 3px solid var(--ce-deep-navy);
        }

        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .ce-animate-float { animation: subtle-float 5s ease-in-out infinite; }

        .ce-gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, var(--ce-light-sky) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .ce-accent-btn {
            background: var(--ce-accent-orange);
            color: #ffffff;
            border-radius: var(--ce-radius-sm);
            box-shadow: 0 4px 15px rgba(255, 99, 33, 0.3);
            transition: all 0.2s ease-in-out;
            font-weight: 700;
        }
        .ce-accent-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 99, 33, 0.5);
        }
        .ce-accent-btn:active {
            transform: scale(0.95);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="ce-bg-main">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
